name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          include-prerelease: true

      - name: Restore
        run: dotnet restore WinXStart.slnx

      - name: Build
        run: dotnet build WinXStart.slnx -c Release --no-restore

      - name: Test
        run: dotnet test WinXStart.slnx -c Release --no-build --nologo --logger "console;verbosity=normal"
